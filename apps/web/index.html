<!doctype html>
<html lang="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0 viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <title>RideFolio</title>

    <style>
      /* Apply dark background immediately if dark theme */
      html.dark {
        background-color: #0a0a0a; /* Your dark background color */
        color-scheme: dark;
      }

      html.light {
        background-color: #ffffff; /* Your light background color */
        color-scheme: light;
      }

      /* Prevent any content from showing until theme is applied */
      html:not(.dark):not(.light) {
        background-color: #0a0a0a; /* Default to dark to avoid flash */
      }
    </style>

    <script>
      (function () {
        try {
          const theme = localStorage.getItem("theme") || "system";
          const isDark =
            theme === "dark" || (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);

          // Apply class immediately, synchronously
          document.documentElement.classList.add(isDark ? "dark" : "light");
        } catch (e) {
          // Fallback to dark if error
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
